<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartLibrary - Chat-Based Learning</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      text-align: center;
    }
    h1 {
      color: #2f80ed;
      margin-bottom: 20px;
    }
    p {
      margin-bottom: 20px;
    }
    a.button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #2f80ed;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }
    a.button:hover {
      background-color: #1366d6;
    }
    footer {
      margin-top: 30px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SmartLibrary</h1>
    <p>Welcome to SmartLibrary, your personal chat-based learning assistant. Start learning anywhere, anytime!</p>
    <a class="button" href="omi://start-chat">Open Chat Lessons</a>
    <p>Enroll in courses via <a href="https://your-whop-link.com" target="_blank">Whop</a>.</p>
  </div>
  <footer>
    &copy; 2026 SmartLibrary. All rights reserved.
  </footer>
</body>
</html>
